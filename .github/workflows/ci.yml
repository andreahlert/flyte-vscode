name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Copy tree-sitter WASM
        run: |
          mkdir -p parsers
          cp node_modules/tree-sitter-python/tree-sitter-python.wasm parsers/

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

      - name: Package
        run: npx @vscode/vsce package --no-dependencies

      - name: Upload VSIX
        uses: actions/upload-artifact@v4
        with:
          name: flyte-vscode
          path: "*.vsix"
