<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" width="800" height="380">
  <defs>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>
  <style>
    @keyframes clickPulse {
      0%, 40% { fill-opacity: 0; }
      45% { fill-opacity: 0.3; }
      55% { fill-opacity: 0; }
      100% { fill-opacity: 0; }
    }
    @keyframes tuiFade {
      0%, 55% { opacity: 0; }
      65%, 90% { opacity: 1; }
      100% { opacity: 0; }
    }
    .mono { font-family: 'Cascadia Code', 'Fira Code', Consolas, monospace; }
  </style>

  <!-- Window frame -->
  <rect width="800" height="380" rx="8" fill="#1e1e1e" filter="url(#shadow)"/>
  <rect width="800" height="32" rx="8" fill="#2d2d2d"/>
  <circle cx="16" cy="16" r="5" fill="#ff5f57"/>
  <circle cx="34" cy="16" r="5" fill="#ffbd2e"/>
  <circle cx="52" cy="16" r="5" fill="#28c840"/>
  <text x="400" y="20" text-anchor="middle" fill="#999" font-size="12" class="mono">pipeline.py</text>

  <!-- Line numbers -->
  <text x="20" y="62" fill="#555" font-size="12" class="mono">25</text>
  <text x="20" y="82" fill="#555" font-size="12" class="mono">26</text>
  <text x="20" y="102" fill="#555" font-size="12" class="mono">27</text>
  <text x="20" y="127" fill="#555" font-size="12" class="mono">28</text>
  <text x="20" y="147" fill="#555" font-size="12" class="mono">29</text>
  <text x="20" y="167" fill="#555" font-size="12" class="mono">30</text>
  <text x="20" y="192" fill="#555" font-size="12" class="mono">31</text>
  <text x="20" y="212" fill="#555" font-size="12" class="mono">32</text>

  <!-- CodeLens line -->
  <text x="50" y="62" fill="#6C3FC5" font-size="11" class="mono">▷ Run Task</text>
  <text x="145" y="62" fill="#555" font-size="11" class="mono">|</text>
  <text x="155" y="62" fill="#6C3FC5" font-size="11" class="mono">⊞ Graph</text>

  <!-- Click animation on Run Task -->
  <rect x="45" y="50" width="90" height="16" rx="3" fill="#6C3FC5">
    <animate attributeName="fill-opacity" values="0;0;0.3;0;0;0" dur="6s" repeatCount="indefinite"/>
  </rect>

  <!-- Decorator -->
  <text x="50" y="82" fill="#dcdcaa" font-size="13" class="mono">@data_env.task</text>

  <!-- Function -->
  <text x="50" y="102" fill="#569cd6" font-size="13" class="mono">async def</text>
  <text x="150" y="102" fill="#dcdcaa" font-size="13" class="mono">run_training_pipeline</text>
  <text x="360" y="102" fill="#d4d4d4" font-size="13" class="mono">(</text>

  <!-- Params -->
  <text x="70" y="127" fill="#9cdcfe" font-size="13" class="mono">source_url</text>
  <text x="170" y="127" fill="#d4d4d4" font-size="13" class="mono">:</text>
  <text x="180" y="127" fill="#4ec9b0" font-size="13" class="mono">str</text>
  <text x="210" y="127" fill="#d4d4d4" font-size="13" class="mono">=</text>
  <text x="225" y="127" fill="#ce9178" font-size="13" class="mono">"s3://datasets/..."</text>
  <text x="410" y="127" fill="#d4d4d4" font-size="13" class="mono">,</text>

  <text x="70" y="147" fill="#9cdcfe" font-size="13" class="mono">num_shards</text>
  <text x="160" y="147" fill="#d4d4d4" font-size="13" class="mono">:</text>
  <text x="170" y="147" fill="#4ec9b0" font-size="13" class="mono">int</text>
  <text x="200" y="147" fill="#d4d4d4" font-size="13" class="mono">=</text>
  <text x="215" y="147" fill="#b5cea8" font-size="13" class="mono">8</text>
  <text x="225" y="147" fill="#d4d4d4" font-size="13" class="mono">,</text>

  <text x="50" y="167" fill="#d4d4d4" font-size="13" class="mono">) -></text>
  <text x="100" y="167" fill="#4ec9b0" font-size="13" class="mono">str</text>
  <text x="125" y="167" fill="#d4d4d4" font-size="13" class="mono">:</text>

  <text x="70" y="192" fill="#6a9955" font-size="13" class="mono">"""Full ML pipeline"""</text>

  <text x="70" y="212" fill="#9cdcfe" font-size="13" class="mono">raw_data</text>
  <text x="145" y="212" fill="#d4d4d4" font-size="13" class="mono">=</text>
  <text x="155" y="212" fill="#569cd6" font-size="13" class="mono">await</text>
  <text x="205" y="212" fill="#dcdcaa" font-size="13" class="mono">fetch_dataset(source_url)</text>

  <!-- TUI popup -->
  <g style="animation: tuiFade 6s ease-in-out infinite">
    <rect x="150" y="240" width="500" height="100" rx="6" fill="#1a1a2e" stroke="#6C3FC5" stroke-width="2"/>
    <rect x="150" y="240" width="500" height="22" rx="6" fill="#6C3FC5"/>
    <text x="320" y="256" fill="#fff" font-size="11" class="mono" text-anchor="middle">Flyte Local Run — completed</text>

    <text x="165" y="280" fill="#28c840" font-size="12" class="mono">✓</text>
    <text x="180" y="280" fill="#ccc" font-size="12" class="mono">run_training_pipeline (0.5s)</text>

    <text x="165" y="305" fill="#888" font-size="11" class="mono">Output: # Training Report</text>
    <text x="165" y="322" fill="#888" font-size="11" class="mono">Best Model: bert-base-uncased (F1: 0.918)</text>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="355" width="800" height="25" fill="#6C3FC5"/>
  <text x="15" y="372" fill="#fff" font-size="11" class="mono">Flyte</text>
  <text x="720" y="372" fill="#fff" font-size="11" class="mono">Python</text>
</svg>
