<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420">
  <defs>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>
  <style>
    @keyframes dropdownFade {
      0%, 30% { opacity: 0; transform: translateY(-4px); }
      40%, 100% { opacity: 1; transform: translateY(0); }
    }
    @keyframes cursorBlink {
      0%, 49% { opacity: 1; }
      50%, 100% { opacity: 0; }
    }
    @keyframes typeIn {
      0%, 15% { width: 0; }
      25%, 100% { width: 32px; }
    }
    @keyframes highlightRow {
      0%, 45% { fill: transparent; }
      50%, 70% { fill: #6C3FC5; fill-opacity: 0.3; }
      75%, 100% { fill: transparent; }
    }
    .mono { font-family: 'Cascadia Code', 'Fira Code', Consolas, monospace; }
  </style>

  <!-- Window frame -->
  <rect width="800" height="420" rx="8" fill="#1e1e1e" filter="url(#shadow)"/>
  <rect width="800" height="32" rx="8" fill="#2d2d2d"/>
  <circle cx="16" cy="16" r="5" fill="#ff5f57"/>
  <circle cx="34" cy="16" r="5" fill="#ffbd2e"/>
  <circle cx="52" cy="16" r="5" fill="#28c840"/>
  <text x="400" y="20" text-anchor="middle" fill="#999" font-size="12" class="mono">pipeline.py</text>

  <!-- Editor content -->
  <text x="50" y="60" fill="#569cd6" font-size="13" class="mono">import</text>
  <text x="110" y="60" fill="#dcdcaa" font-size="13" class="mono">flyte</text>

  <text x="50" y="90" fill="#9cdcfe" font-size="13" class="mono">env</text>
  <text x="80" y="90" fill="#d4d4d4" font-size="13" class="mono">=</text>
  <text x="95" y="90" fill="#dcdcaa" font-size="13" class="mono">flyte.TaskEnvironment(</text>

  <text x="70" y="115" fill="#9cdcfe" font-size="13" class="mono">name</text>
  <text x="110" y="115" fill="#d4d4d4" font-size="13" class="mono">=</text>
  <text x="120" y="115" fill="#ce9178" font-size="13" class="mono">"my-pipeline"</text>
  <text x="240" y="115" fill="#d4d4d4" font-size="13" class="mono">,</text>

  <!-- Typing cursor line -->
  <text x="70" y="140" fill="#d4d4d4" font-size="13" class="mono"> </text>
  <rect x="70" y="130" width="2" height="16" fill="#d4d4d4">
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
  </rect>

  <!-- Autocomplete dropdown -->
  <g style="animation: dropdownFade 4s ease-in-out infinite">
    <rect x="60" y="148" width="320" height="230" rx="4" fill="#252526" stroke="#454545" stroke-width="1"/>

    <!-- Items -->
    <rect x="62" y="150" width="316" height="24" rx="2" fill="#6C3FC5" fill-opacity="0.25"/>
    <text x="80" y="167" fill="#6C3FC5" font-size="12" class="mono" font-weight="bold">resources</text>
    <text x="180" y="167" fill="#888" font-size="11" class="mono">Resources = None</text>

    <rect x="62" y="176" width="316" height="24" rx="2">
      <animate attributeName="fill" values="transparent;#6C3FC533;transparent" dur="4s" repeatCount="indefinite"/>
    </rect>
    <text x="80" y="193" fill="#dcdcaa" font-size="12" class="mono">cache</text>
    <text x="180" y="193" fill="#888" font-size="11" class="mono">"auto" | "disable" | Cache</text>

    <text x="80" y="219" fill="#dcdcaa" font-size="12" class="mono">secrets</text>
    <text x="180" y="219" fill="#888" font-size="11" class="mono">str | Secret | list</text>

    <text x="80" y="245" fill="#dcdcaa" font-size="12" class="mono">env_vars</text>
    <text x="180" y="245" fill="#888" font-size="11" class="mono">dict[str, str] = None</text>

    <text x="80" y="271" fill="#dcdcaa" font-size="12" class="mono">interruptible</text>
    <text x="180" y="271" fill="#888" font-size="11" class="mono">bool = False</text>

    <text x="80" y="297" fill="#dcdcaa" font-size="12" class="mono">queue</text>
    <text x="180" y="297" fill="#888" font-size="11" class="mono">str = None</text>

    <text x="80" y="323" fill="#dcdcaa" font-size="12" class="mono">reusable</text>
    <text x="180" y="323" fill="#888" font-size="11" class="mono">ReusePolicy = None</text>

    <text x="80" y="349" fill="#dcdcaa" font-size="12" class="mono">pod_template</text>
    <text x="180" y="349" fill="#888" font-size="11" class="mono">str | PodTemplate = None</text>
  </g>

  <!-- Detail panel -->
  <g style="animation: dropdownFade 4s ease-in-out infinite">
    <rect x="390" y="148" width="380" height="100" rx="4" fill="#252526" stroke="#454545" stroke-width="1"/>
    <text x="400" y="170" fill="#6C3FC5" font-size="12" class="mono" font-weight="bold">resources</text>
    <text x="480" y="170" fill="#888" font-size="11" class="mono">: Resources</text>
    <text x="400" y="192" fill="#ccc" font-size="11" class="mono">CPU, memory, GPU allocation</text>
    <text x="400" y="215" fill="#888" font-size="11" class="mono">Default:</text>
    <text x="460" y="215" fill="#ce9178" font-size="11" class="mono">None</text>
    <text x="400" y="237" fill="#888" font-size="11" class="mono">(optional)</text>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="395" width="800" height="25" fill="#6C3FC5"/>
  <text x="15" y="412" fill="#fff" font-size="11" class="mono">Flyte</text>
  <text x="720" y="412" fill="#fff" font-size="11" class="mono">Python</text>
</svg>
