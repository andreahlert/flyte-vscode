<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <style>
    @keyframes typing { 0%,20%{width:0} 30%,100%{width:32px} }
    @keyframes dropShow { 0%,25%{opacity:0;transform:translateY(-3px)} 35%,90%{opacity:1;transform:translateY(0)} 95%,100%{opacity:0} }
    @keyframes cursorBlink { 0%,49%{opacity:1} 50%,100%{opacity:0} }
    @keyframes highlightItem { 0%,50%{fill-opacity:0.25} 55%,70%{fill-opacity:0.45} 75%,100%{fill-opacity:0.25} }
    .mono { font-family: 'Cascadia Code','Fira Code','SF Mono',Consolas,monospace }
    .sans { font-family: -apple-system,'Segoe UI',system-ui,sans-serif }
  </style>

  <!-- Window -->
  <rect width="800" height="450" rx="8" fill="#1e1e1e"/>
  <rect width="800" height="30" rx="8" fill="#323233"/>
  <rect x="0" y="22" width="800" height="8" fill="#323233"/>
  <circle cx="16" cy="15" r="5" fill="#ff5f57"/>
  <circle cx="34" cy="15" r="5" fill="#ffbd2e"/>
  <circle cx="52" cy="15" r="5" fill="#28c840"/>
  <text x="400" y="19" text-anchor="middle" fill="#999" font-size="11" class="sans">pipeline.py</text>

  <!-- Line numbers -->
  <g fill="#555" font-size="12" class="mono">
    <text x="18" y="56">24</text>
    <text x="18" y="72">25</text>
    <text x="18" y="88">26</text>
    <text x="18" y="104">27</text>
    <text x="18" y="120">28</text>
    <text x="18" y="136">29</text>
    <text x="18" y="152">30</text>
    <text x="18" y="168">31</text>
    <text x="18" y="184">32</text>
    <text x="18" y="200">33</text>
    <text x="18" y="216">34</text>
    <text x="18" y="232">35</text>
    <text x="18" y="248">36</text>
  </g>

  <!-- Code -->
  <text x="48" y="56" fill="#6a9955" font-size="12" class="mono"># CPU environment for data processing tasks</text>
  <text x="48" y="72" fill="#9cdcfe" font-size="12" class="mono">data_env</text>
  <text x="112" y="72" fill="#d4d4d4" font-size="12" class="mono">= flyte.</text>
  <text x="172" y="72" fill="#4ec9b0" font-size="12" class="mono">TaskEnvironment</text>
  <text x="294" y="72" fill="#d4d4d4" font-size="12" class="mono">(</text>

  <text x="68" y="88" fill="#9cdcfe" font-size="12" class="mono">name</text>
  <text x="102" y="88" fill="#d4d4d4" font-size="12" class="mono">=</text>
  <text x="112" y="88" fill="#ce9178" font-size="12" class="mono">"data-processing"</text>
  <text x="260" y="88" fill="#d4d4d4" font-size="12" class="mono">,</text>

  <text x="68" y="104" fill="#9cdcfe" font-size="12" class="mono">image</text>
  <text x="110" y="104" fill="#d4d4d4" font-size="12" class="mono">=(</text>

  <text x="88" y="120" fill="#d4d4d4" font-size="12" class="mono">flyte.Image.from_debian_base()</text>

  <text x="88" y="136" fill="#d4d4d4" font-size="12" class="mono">.with_pip_packages(</text>
  <text x="242" y="136" fill="#ce9178" font-size="12" class="mono">"pandas"</text>
  <text x="304" y="136" fill="#d4d4d4" font-size="12" class="mono">, ...)</text>

  <text x="68" y="152" fill="#d4d4d4" font-size="12" class="mono">),</text>

  <text x="68" y="168" fill="#9cdcfe" font-size="12" class="mono">resources</text>
  <text x="140" y="168" fill="#d4d4d4" font-size="12" class="mono">=flyte.Resources(cpu=2, memory=</text>
  <text x="452" y="168" fill="#ce9178" font-size="12" class="mono">"4Gi"</text>
  <text x="490" y="168" fill="#d4d4d4" font-size="12" class="mono">),</text>

  <!-- Current line highlight -->
  <rect x="44" y="176" width="750" height="16" fill="#264f78" fill-opacity="0.3"/>

  <!-- Cursor blinking -->
  <rect x="68" y="178" width="1.5" height="14" fill="#aeafad">
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
  </rect>

  <text x="68" y="200" fill="#9cdcfe" font-size="12" class="mono">cache</text>
  <text x="105" y="200" fill="#d4d4d4" font-size="12" class="mono">=</text>
  <text x="112" y="200" fill="#ce9178" font-size="12" class="mono">"auto"</text>
  <text x="158" y="200" fill="#d4d4d4" font-size="12" class="mono">,</text>

  <text x="68" y="216" fill="#9cdcfe" font-size="12" class="mono">env_vars</text>
  <text x="134" y="216" fill="#d4d4d4" font-size="12" class="mono">={</text>
  <text x="150" y="216" fill="#ce9178" font-size="12" class="mono">"PYTHONUNBUFFERED"</text>
  <text x="312" y="216" fill="#d4d4d4" font-size="12" class="mono">:</text>
  <text x="322" y="216" fill="#ce9178" font-size="12" class="mono">"1"</text>
  <text x="345" y="216" fill="#d4d4d4" font-size="12" class="mono">},</text>

  <text x="68" y="232" fill="#9cdcfe" font-size="12" class="mono">interruptible</text>
  <text x="168" y="232" fill="#d4d4d4" font-size="12" class="mono">=</text>
  <text x="178" y="232" fill="#569cd6" font-size="12" class="mono">True</text>
  <text x="210" y="232" fill="#d4d4d4" font-size="12" class="mono">,</text>

  <text x="68" y="248" fill="#9cdcfe" font-size="12" class="mono">queue</text>
  <text x="105" y="248" fill="#d4d4d4" font-size="12" class="mono">=</text>
  <text x="112" y="248" fill="#ce9178" font-size="12" class="mono">"default"</text>
  <text x="184" y="248" fill="#d4d4d4" font-size="12" class="mono">,</text>

  <!-- Autocomplete dropdown -->
  <g style="animation: dropShow 5s ease-in-out infinite">
    <rect x="58" y="192" width="360" height="220" rx="4" fill="#252526" stroke="#454545" stroke-width="1"/>

    <!-- Selected item -->
    <rect x="60" y="194" width="356" height="22" rx="2" fill="#04395e"/>
    <text x="76" y="210" fill="#569cd6" font-size="12" class="mono">⊞</text>
    <text x="92" y="210" fill="#dcdcaa" font-size="12" class="mono">interruptible</text>
    <text x="215" y="210" fill="#888" font-size="11" class="mono">bool = False</text>

    <text x="92" y="232" fill="#dcdcaa" font-size="12" class="mono">queue</text>
    <text x="215" y="232" fill="#888" font-size="11" class="mono">str = None</text>

    <text x="92" y="254" fill="#dcdcaa" font-size="12" class="mono">reusable</text>
    <text x="215" y="254" fill="#888" font-size="11" class="mono">ReusePolicy = None</text>

    <text x="92" y="276" fill="#dcdcaa" font-size="12" class="mono">plugin_config</text>
    <text x="215" y="276" fill="#888" font-size="11" class="mono">Any = None</text>

    <text x="92" y="298" fill="#dcdcaa" font-size="12" class="mono">pod_template</text>
    <text x="215" y="298" fill="#888" font-size="11" class="mono">str | PodTemplate = None</text>

    <text x="92" y="320" fill="#dcdcaa" font-size="12" class="mono">depends_on</text>
    <text x="215" y="320" fill="#888" font-size="11" class="mono">list[Environment] = []</text>

    <text x="92" y="342" fill="#dcdcaa" font-size="12" class="mono">description</text>
    <text x="215" y="342" fill="#888" font-size="11" class="mono">str = None</text>

    <text x="92" y="364" fill="#dcdcaa" font-size="12" class="mono">secrets</text>
    <text x="215" y="364" fill="#888" font-size="11" class="mono">str | Secret | list = None</text>

    <text x="92" y="386" fill="#dcdcaa" font-size="12" class="mono">env_vars</text>
    <text x="215" y="386" fill="#888" font-size="11" class="mono">dict[str, str] = None</text>

    <text x="92" y="408" fill="#dcdcaa" font-size="12" class="mono">cache</text>
    <text x="215" y="408" fill="#888" font-size="11" class="mono">"auto" | "disable" | Cache</text>
  </g>

  <!-- Detail tooltip -->
  <g style="animation: dropShow 5s ease-in-out infinite">
    <rect x="425" y="192" width="340" height="80" rx="4" fill="#252526" stroke="#454545" stroke-width="1"/>
    <text x="435" y="212" fill="#569cd6" font-size="12" class="mono" font-weight="bold">interruptible</text>
    <text x="545" y="212" fill="#888" font-size="11" class="mono">: bool</text>
    <text x="435" y="232" fill="#ccc" font-size="11" class="mono">Allow scheduling on spot/</text>
    <text x="435" y="248" fill="#ccc" font-size="11" class="mono">preemptible instances</text>
    <text x="435" y="266" fill="#888" font-size="11" class="mono">Default: False</text>
  </g>

  <!-- Status bar -->
  <rect x="0" y="430" width="800" height="20" fill="#007acc"/>
  <text x="15" y="444" fill="#fff" font-size="11" class="sans">Flyte</text>
  <text x="740" y="444" fill="#fff" font-size="11" class="sans">Python</text>
</svg>
