<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>
  <style>
    @keyframes hoverFade {
      0%, 20% { opacity: 0; transform: translateY(4px); }
      30%, 85% { opacity: 1; transform: translateY(0); }
      95%, 100% { opacity: 0; }
    }
    .mono { font-family: 'Cascadia Code', 'Fira Code', Consolas, monospace; }
  </style>

  <!-- Window frame -->
  <rect width="800" height="400" rx="8" fill="#1e1e1e" filter="url(#shadow)"/>
  <rect width="800" height="32" rx="8" fill="#2d2d2d"/>
  <circle cx="16" cy="16" r="5" fill="#ff5f57"/>
  <circle cx="34" cy="16" r="5" fill="#ffbd2e"/>
  <circle cx="52" cy="16" r="5" fill="#28c840"/>
  <text x="400" y="20" text-anchor="middle" fill="#999" font-size="12" class="mono">pipeline.py</text>

  <!-- Code -->
  <text x="50" y="65" fill="#569cd6" font-size="13" class="mono">import</text>
  <text x="110" y="65" fill="#dcdcaa" font-size="13" class="mono">flyte</text>

  <text x="50" y="95" fill="#9cdcfe" font-size="13" class="mono">env</text>
  <text x="80" y="95" fill="#d4d4d4" font-size="13" class="mono">=</text>
  <text x="95" y="95" fill="#dcdcaa" font-size="13" class="mono">flyte.</text>
  <!-- Highlighted word -->
  <rect x="140" y="81" width="155" height="18" rx="2" fill="#6C3FC5" fill-opacity="0.15"/>
  <text x="140" y="95" fill="#4ec9b0" font-size="13" class="mono">TaskEnvironment</text>
  <text x="295" y="95" fill="#d4d4d4" font-size="13" class="mono">(</text>

  <text x="70" y="120" fill="#9cdcfe" font-size="13" class="mono">name</text>
  <text x="110" y="120" fill="#d4d4d4" font-size="13" class="mono">=</text>
  <text x="120" y="120" fill="#ce9178" font-size="13" class="mono">"my-pipeline"</text>
  <text x="240" y="120" fill="#d4d4d4" font-size="13" class="mono">,</text>

  <text x="70" y="145" fill="#9cdcfe" font-size="13" class="mono">resources</text>
  <text x="150" y="145" fill="#d4d4d4" font-size="13" class="mono">=flyte.Resources(cpu=2, memory=</text>
  <text x="465" y="145" fill="#ce9178" font-size="13" class="mono">"4Gi"</text>
  <text x="502" y="145" fill="#d4d4d4" font-size="13" class="mono">),</text>

  <text x="50" y="170" fill="#d4d4d4" font-size="13" class="mono">)</text>

  <!-- Hover tooltip -->
  <g style="animation: hoverFade 5s ease-in-out infinite">
    <rect x="100" y="50" width="550" height="170" rx="6" fill="#252526" stroke="#454545" stroke-width="1"/>

    <text x="115" y="75" fill="#6C3FC5" font-size="13" class="mono" font-weight="bold">flyte.TaskEnvironment</text>

    <line x1="115" y1="82" x2="635" y2="82" stroke="#454545"/>

    <text x="115" y="100" fill="#ccc" font-size="12" class="mono">Defines the execution environment for tasks:</text>
    <text x="115" y="116" fill="#ccc" font-size="12" class="mono">image, resources, caching, and scheduling.</text>

    <line x1="115" y1="126" x2="635" y2="126" stroke="#454545"/>

    <text x="115" y="144" fill="#888" font-size="11" class="mono" font-weight="bold">Parameters:</text>
    <text x="115" y="162" fill="#dcdcaa" font-size="11" class="mono">- name: str</text>
    <text x="260" y="162" fill="#888" font-size="11" class="mono">(required)</text>
    <text x="115" y="178" fill="#dcdcaa" font-size="11" class="mono">- image: str | Image = "auto"</text>
    <text x="115" y="194" fill="#dcdcaa" font-size="11" class="mono">- resources: Resources = None</text>
    <text x="115" y="210" fill="#dcdcaa" font-size="11" class="mono">- cache: "auto" | "disable" | Cache</text>
  </g>

  <!-- Cursor pointer on the word -->
  <g style="animation: hoverFade 5s ease-in-out infinite">
    <path d="M215 100 L215 115 L225 110 L220 108 L228 100 L224 98 L216 106 Z" fill="#fff" opacity="0.8"/>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="375" width="800" height="25" fill="#6C3FC5"/>
  <text x="15" y="392" fill="#fff" font-size="11" class="mono">Flyte</text>
  <text x="720" y="392" fill="#fff" font-size="11" class="mono">Python</text>
</svg>
